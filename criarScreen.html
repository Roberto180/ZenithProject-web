<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/criarScreen.css">
    <title>Criar conta</title>
    <link rel="icon" type="image/x-icon" href="./img/logo z.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main> <!-- main: 1 -->
        
        <section> <!-- section: 2 -->
            
            <!-- logo e nome do site -->
            <article>
                <figure>
                    <img src="./img/logo.png" alt="Logo Zenith">
                </figure>
                <p>Cadastro de Psicólogo</p>
            </article>

            <!-- botões e etc abaixo em section-->
               <form action="#" method="post">

                   <div class="linha1">
                       <div class="input-container">
                           <img src="./img/user.svg" alt="icone" class="icon-input">
                           <label for="name" class="label-diferenciado">Nome Completo:</label>
                           <input type="text" class="input-diferenciado" name="email" required placeholder="Seu nome completo">
                       </div>
                       <div class="input-container">
                           <img src="./img/telefone.svg" alt="icone" class="icon-input">
                           <label for="telefone" class="label-diferenciado">Telefone:</label>
                           <input type="text" class="input-diferenciado" name="password" required placeholder="(00) 00000-0000">
                       </div>
                   </div>
                   
                   <!-- ----separador---- -->
                   
                   <div class="linha2">
                       <div class="input-container">
                           <img src="./img/calendar.png" alt="icone" class="icon-input">
                           <label for="data" class="label-diferenciado">Data Nascimento:</label>
                           <input type="date" class="input-diferenciado" name="email" required placeholder="DD/MM/AAAA">
                       </div>
                       <div class="input-container">
                           <img src="./img/arrow.png" alt="icone" class="icon-input">
                           <label for="genero" class="label-diferenciado">Gênero:</label>
                           <input type="text" class="input-diferenciado" name="email" required placeholder="">
                        </div>
                   </div>
                       
                       
                   <!-- ----separador---- -->

                   <div class="linha3">
                       <div class="input-container">
                           <img src="./img/lock.svg" alt="icone" class="icon-input">
                           <label for="password" class="label-diferenciado">CPF:</label>
                           <input type="password" class="input-diferenciado" name="password" required placeholder="000.000.000-0">
                       </div>
                       
                       <div class="input-container">
                           <img src="./img/user.svg" alt="icone" class="icon-input">
                           <label for="password" class="label-diferenciado">Número do CRP:</label>
                           <input type="password" class="input-diferenciado" name="password" required placeholder="XX/XXXXX">
                       </div>
                   </div>

                   <!-- ----separador---- -->
                    
                    <button href="./criarScreen2.html" class="botaoC">Próximo -></button>
                    
                    <div class="façaContainer">
                        <p>Já possui conta? </p><a href="./loginScreen.html" class="faça-login">Faça login</a>
                    </div>
                </form>
                
            </section>
        
        </main>
        <p class="mds">&copy; 2026 Zenith. Todos os direitos reservados.</p>

        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
